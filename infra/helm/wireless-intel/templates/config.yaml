apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
data:
  ENVIRONMENT: {{ .Values.config.environment | quote }}
  CHROMA_HOST: {{ .Values.config.chromaHost | quote }}
  CHROMA_PORT: {{ .Values.config.chromaPort | quote }}
  RATE_LIMIT: {{ .Values.config.rateLimit | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  TAVILY_API_KEY: {{ .Values.secrets.tavilyApiKey | quote }}
