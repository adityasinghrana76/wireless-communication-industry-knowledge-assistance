replicaCount:
  backend: 2
  frontend: 2
  worker: 2

image:
  backend: ghcr.io/example/wireless-backend:latest
  frontend: ghcr.io/example/wireless-frontend:latest

config:
  environment: production
  chromaHost: chromadb
  chromaPort: "8000"
  rateLimit: 120/minute

secrets:
  databaseUrl: postgresql+psycopg://wireless:wireless@postgres:5432/wireless
  redisUrl: redis://redis:6379/0
  jwtSecret: replace-me
  openaiApiKey: ""
  tavilyApiKey: ""
