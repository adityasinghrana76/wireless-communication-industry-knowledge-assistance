apiVersion: apps/v1
kind: Deployment
metadata:
  name: wireless-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wireless-frontend
  template:
    metadata:
      labels:
        app: wireless-frontend
    spec:
      containers:
        - name: web
          image: ghcr.io/example/wireless-frontend:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: wireless-frontend
spec:
  selector:
    app: wireless-frontend
  ports:
    - port: 80
      targetPort: 80
