apiVersion: v1
kind: ConfigMap
metadata:
  name: wireless-config
data:
  ENVIRONMENT: production
  CHROMA_HOST: chromadb
  CHROMA_PORT: "8000"
  RATE_LIMIT: 120/minute
---
apiVersion: v1
kind: Secret
metadata:
  name: wireless-secrets
type: Opaque
stringData:
  DATABASE_URL: postgresql+psycopg://wireless:wireless@postgres:5432/wireless
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET: replace-with-secret-manager-value
  OPENAI_API_KEY: ""
  TAVILY_API_KEY: ""
